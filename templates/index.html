<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Performance Prediction</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #c1c9ee, #d6b1fc);
            margin: 0;
            padding: 40px;
            color: white;
        }

        .container {
            background: white;
            color: black;
            padding: 30px;
            border-radius: 12px;
            width: 800px;
            margin: auto;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 25px;
        }

        /* GRID LAYOUT (2 columns like Streamlit) */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            margin-bottom: 5px;
        }

        select, input {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            grid-column: span 2; /* button full width */
            margin-top: 15px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #5a67d8;
        }

        /* RESULT CARD */
        .result-card {
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            background: linear-gradient(to right, #43e97b, #38f9d7);
            color: black;
            font-size: 22px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            animation: fadeIn 0.6s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

    </style>
</head>

<body>

<div class="container">
    <h1>Predict Math Score</h1>

    <form action="{{ url_for('predict_datapoint') }}" method="POST">
        
        <div class="form-grid">

            <div class="form-group">
                <label>Gender</label>
                <select name="gender" required>
                    <option value="">Select</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
            </div>

            <div class="form-group">
                <label>Race/Ethnicity</label>
                <select name="race_ethnicity" required>
                    <option value="">Select</option>
                    <option value="group A">Group A</option>
                    <option value="group B">Group B</option>
                    <option value="group C">Group C</option>
                    <option value="group D">Group D</option>
                    <option value="group E">Group E</option>
                </select>
            </div>

            <div class="form-group">
                <label>Parental Education</label>
                <select name="parental_level_of_education" required>
                    <option value="">Select</option>
                    <option value="some high school">Some High School</option>
                    <option value="high school">High School</option>
                    <option value="some college">Some College</option>
                    <option value="associate's degree">Associate's Degree</option>
                    <option value="bachelor's degree">Bachelor's Degree</option>
                    <option value="master's degree">Master's Degree</option>
                </select>
            </div>

            <div class="form-group">
                <label>Lunch</label>
                <select name="lunch" required>
                    <option value="">Select</option>
                    <option value="standard">Standard</option>
                    <option value="free/reduced">Free/Reduced</option>
                </select>
            </div>

            <div class="form-group">
                <label>Test Preparation</label>
                <select name="test_preparation_course" required>
                    <option value="">Select</option>
                    <option value="none">None</option>
                    <option value="completed">Completed</option>
                </select>
            </div>

            <div class="form-group">
                <label>Reading Score</label>
                <input type="number" name="reading_score" min="0" max="100" required>
            </div>

            <div class="form-group">
                <label>Writing Score</label>
                <input type="number" name="writing_score" min="0" max="100" required>
            </div>

            <button type="submit">Predict Score</button>

        </div>
    </form>

    <!--  Stylish Result -->
    {% if result %}
        <div class="result-card">
            Predicted Math Score: {{ result }}
        </div>
    {% endif %}

</div>

</body>
</html>
